<title>解耦执行</title>
<style>
  :root {
    --bg: #EAEDE9;
    --surface: #FFFFFF;
    --ink: #202524;
    --ink-muted: #5A6360;
    --accent-calm: #34505A;
    --accent-action: #96662A;
    --border: #D7DCD6;
    --on-accent: #FFFFFF;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14181A;
      --surface: #1D2224;
      --ink: #E7EAE7;
      --ink-muted: #9BA6A2;
      --accent-calm: #6F98A3;
      --accent-action: #D9A24F;
      --border: #2A3033;
      --on-accent: #14181A;
    }
  }
  :root[data-theme="dark"] {
    --bg: #14181A;
    --surface: #1D2224;
    --ink: #E7EAE7;
    --ink-muted: #9BA6A2;
    --accent-calm: #6F98A3;
    --accent-action: #D9A24F;
    --border: #2A3033;
    --on-accent: #14181A;
  }
  :root[data-theme="light"] {
    --bg: #EAEDE9;
    --surface: #FFFFFF;
    --ink: #202524;
    --ink-muted: #5A6360;
    --accent-calm: #34505A;
    --accent-action: #96662A;
    --border: #D7DCD6;
    --on-accent: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--ink);
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .dots {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .dot.active { background: var(--accent-calm); }
  .dot.done { background: var(--accent-action); }
  .step { display: none; flex-direction: column; gap: 16px; }
  .step.active { display: flex; }
  h1 {
    font-family: "Songti SC", "Noto Serif SC", serif;
    font-size: 1.3rem;
    font-weight: 600;
    text-wrap: balance;
    margin: 0;
    color: var(--ink);
  }
  p.hint {
    margin: 0;
    color: var(--ink-muted);
    font-size: 0.9rem;
    line-height: 1.5;
  }
  input[type="text"], textarea {
    width: 100%;
    font-size: 1rem;
    font-family: inherit;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    resize: none;
  }
  input[type="text"]:focus, textarea:focus {
    outline: 2px solid var(--accent-calm);
    outline-offset: 1px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink-muted);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--accent-calm); color: var(--accent-calm); }
  .chip:focus-visible { outline: 2px solid var(--accent-calm); outline-offset: 2px; }
  button.primary {
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    color: var(--on-accent);
    background: var(--accent-calm);
    border: none;
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
  }
  button.primary:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .step[data-step="3"] button.primary, .step[data-step="4"] button.primary {
    background: var(--accent-action);
  }
  .timer {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 2.4rem;
    text-align: center;
    color: var(--accent-action);
  }
  .summary-box {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 0.85rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--ink);
  }
  .copied { color: var(--accent-action); font-size: 0.85rem; text-align: center; min-height: 1.2em; }
  @media (prefers-reduced-motion: no-preference) {
    .step.active { animation: fade 0.25s ease; }
  }
  @keyframes fade {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="card">
  <div class="dots" id="dots"></div>

  <div class="step active" data-step="1">
    <h1>你现在感觉到的具体情绪是什么？</h1>
    <p class="hint">越具体越好——不是"不好"，是哪一种不好。</p>
    <div class="chips" id="emotionChips"></div>
    <input type="text" id="emotionInput" placeholder="我感到……" />
    <button class="primary" data-next="2">下一步</button>
  </div>

  <div class="step" data-step="2">
    <h1>这个情绪最想让你做什么？反过来你会做什么？</h1>
    <p class="hint">先说逃避冲动，再说和它相反的动作。</p>
    <input type="text" id="urgeInput" placeholder="它想让我……" />
    <input type="text" id="oppositeInput" placeholder="反过来，我会……" />
    <button class="primary" data-next="3">下一步</button>
  </div>

  <div class="step" data-step="3">
    <h1>压缩成一个两分钟内能开始的最小动作</h1>
    <p class="hint">小到不能再小的第一步。写下来，然后可以按开始计时。</p>
    <input type="text" id="actionInput" placeholder="两分钟内我会……" />
    <div class="timer" id="timerDisplay">2:00</div>
    <button class="primary" id="timerBtn">开始两分钟</button>
    <button class="primary" data-next="4">下一步</button>
  </div>

  <div class="step" data-step="4">
    <h1>用"我选择"确认</h1>
    <p class="hint">不需要保证做到，只需要说出这句话。</p>
    <input type="text" id="chooseInput" placeholder="我选择现在……" />
    <p class="hint">你现在会执行吗？</p>
    <div class="chips">
      <button class="chip" data-exec="是">会</button>
      <button class="chip" data-exec="稍后">稍后</button>
      <button class="chip" data-exec="不确定">不确定</button>
    </div>
    <button class="primary" data-next="5">完成，去记录</button>
  </div>

  <div class="step" data-step="5">
    <h1>记录已保存在本机</h1>
    <p class="hint">回到电脑后，把下面这行复制粘贴进 raw.md：</p>
    <div class="summary-box" id="summaryBox"></div>
    <div class="copied" id="copiedMsg"></div>
    <button class="primary" id="copyBtn">复制</button>
    <button class="primary" id="restartBtn">再来一次</button>
  </div>
</div>

<script>
(function () {
  var state = { emotion: "", urge: "", opposite: "", action: "", choose: "", exec: "稍后" };
  var totalSteps = 5;
  var timerInterval = null;
  var timerSeconds = 120;

  var dotsEl = document.getElementById("dots");
  for (var i = 1; i <= totalSteps; i++) {
    var d = document.createElement("div");
    d.className = "dot" + (i === 1 ? " active" : "");
    d.dataset.dot = i;
    dotsEl.appendChild(d);
  }

  var emotionWords = ["羞耻", "恐惧", "烦躁", "无力", "愤怒", "麻木", "委屈", "自我怀疑"];
  var chipsEl = document.getElementById("emotionChips");
  emotionWords.forEach(function (w) {
    var b = document.createElement("button");
    b.className = "chip";
    b.type = "button";
    b.textContent = w;
    b.addEventListener("click", function () {
      var input = document.getElementById("emotionInput");
      input.value = input.value ? input.value + " " + w : "我感到" + w;
      input.focus();
    });
    chipsEl.appendChild(b);
  });

  function showStep(n) {
    document.querySelectorAll(".step").forEach(function (s) {
      s.classList.toggle("active", s.dataset.step === String(n));
    });
    document.querySelectorAll(".dot").forEach(function (d) {
      var idx = Number(d.dataset.dot);
      d.classList.toggle("active", idx === n);
      d.classList.toggle("done", idx < n);
    });
  }

  document.querySelectorAll("[data-next]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.emotion = document.getElementById("emotionInput").value.trim();
      state.urge = document.getElementById("urgeInput") ? document.getElementById("urgeInput").value.trim() : state.urge;
      state.opposite = document.getElementById("oppositeInput") ? document.getElementById("oppositeInput").value.trim() : state.opposite;
      state.action = document.getElementById("actionInput") ? document.getElementById("actionInput").value.trim() : state.action;
      state.choose = document.getElementById("chooseInput") ? document.getElementById("chooseInput").value.trim() : state.choose;
      var next = Number(btn.dataset.next);
      if (next === 5) finalizeEntry();
      showStep(next);
    });
  });

  document.querySelectorAll("[data-exec]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.exec = btn.dataset.exec;
      document.querySelectorAll("[data-exec]").forEach(function (b) {
        b.style.borderColor = "";
        b.style.color = "";
      });
      btn.style.borderColor = "var(--accent-action)";
      btn.style.color = "var(--accent-action)";
    });
  });

  document.getElementById("timerBtn").addEventListener("click", function () {
    if (timerInterval) return;
    timerSeconds = 120;
    timerInterval = setInterval(function () {
      timerSeconds--;
      var m = Math.floor(timerSeconds / 60);
      var s = timerSeconds % 60;
      document.getElementById("timerDisplay").textContent = m + ":" + (s < 10 ? "0" : "") + s;
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }, 1000);
  });

  function pad(n) { return n < 10 ? "0" + n : String(n); }

  function formatLine() {
    var d = new Date();
    var ts = d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    return "- [" + ts + "] [unstuck] 情绪:" + state.emotion + " 逃避冲动:" + state.urge + " 实际动作:" + state.action + " 是否执行:" + state.exec;
  }

  function finalizeEntry() {
    var line = formatLine();
    document.getElementById("summaryBox").textContent = line;
    try {
      var log = JSON.parse(localStorage.getItem("unstuckLog") || "[]");
      log.push(line);
      localStorage.setItem("unstuckLog", JSON.stringify(log));
    } catch (e) {}
  }

  document.getElementById("copyBtn").addEventListener("click", function () {
    var text = document.getElementById("summaryBox").textContent;
    var msg = document.getElementById("copiedMsg");
    function showCopied() {
      msg.textContent = "已复制";
      setTimeout(function () { msg.textContent = ""; }, 2000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(showCopied).catch(function () {
        fallbackCopy(text, showCopied);
      });
    } else {
      fallbackCopy(text, showCopied);
    }
  });

  function fallbackCopy(text, cb) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    cb();
  }

  document.getElementById("restartBtn").addEventListener("click", function () {
    state = { emotion: "", urge: "", opposite: "", action: "", choose: "", exec: "稍后" };
    document.getElementById("emotionInput").value = "";
    document.getElementById("urgeInput").value = "";
    document.getElementById("oppositeInput").value = "";
    document.getElementById("actionInput").value = "";
    document.getElementById("chooseInput").value = "";
    document.getElementById("timerDisplay").textContent = "2:00";
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.querySelectorAll("[data-exec]").forEach(function (b) {
      b.style.borderColor = "";
      b.style.color = "";
    });
    showStep(1);
  });
})();
</script>
